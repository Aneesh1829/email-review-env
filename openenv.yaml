name: email_review_env
version: "1.0.0"
openenv_version: "0.2.0"
description: >
  A real-world customer support email triage environment.
  An AI agent learns to categorize, prioritize, and draft replies
  to customer support emails with increasing difficulty.
  Tasks range from simple billing queries (Easy) to complex
  multi-issue emails involving angry premium subscribers (Hard).

author: JhansiY1
license: MIT
observation_type: email_review_env.models.EmailObservation
action_type: email_review_env.models.EmailAction
max_episode_steps: 3

environment:
  type: text
  tasks:
    - id: task_1_easy
      name: easy
      difficulty: easy
      description: "Simple billing double-charge complaint"
      max_steps: 1
      grader: "tasks.task_1_easy.grader:grade"
      has_grader: true
    - id: task_2_medium
      name: medium
      difficulty: medium
      description: "Angry premium subscriber with service outage"
      max_steps: 1
      grader: "tasks.task_2_medium.grader:grade"
      has_grader: true
    - id: task_3_hard
      name: hard
      difficulty: hard
      description: "Complex dual-issue: API auth failure + wrong billing tier"
      max_steps: 1
      grader: "tasks.task_3_hard.grader:grade"
      has_grader: true

tasks:
  - id: task_1_easy
    name: easy
    difficulty: easy
    description: "Simple billing double-charge complaint"
    max_steps: 1
    grader: "tasks.task_1_easy.grader:grade"
    has_grader: true
  - id: task_2_medium
    name: medium
    difficulty: medium
    description: "Angry premium subscriber with service outage"
    max_steps: 1
    grader: "tasks.task_2_medium.grader:grade"
    has_grader: true
  - id: task_3_hard
    name: hard
    difficulty: hard
    description: "Complex dual-issue: API auth failure + wrong billing tier"
    max_steps: 1
    grader: "tasks.task_3_hard.grader:grade"
    has_grader: true

api:
  reset: true
  step: true
  state: true

scoring:
  min: 0.0
  max: 1.0
  partial_credit: true

tags:
  - nlp
  - customer-support
  - email
  - real-world
  - triage

grader: "graders:grade_task"
